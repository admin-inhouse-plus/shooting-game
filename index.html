<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #050510;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }
  canvas {
    background: #000;
    border: 1px solid #223;
    box-shadow: 0 0 32px rgba(80, 160, 255, 0.25);
    image-rendering: pixelated;
  }
  .hint {
    margin-top: 12px;
    font-size: 13px;
    color: #888;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <canvas id="game" width="480" height="640"></canvas>
  <div class="hint">←→ / A D 移動 &nbsp;・&nbsp; Space 発射 &nbsp;・&nbsp; R リスタート &nbsp;・&nbsp; T タイトル</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const DIFFICULTIES = {
    easy:   { key: '1', label: 'EASY',   color: '#7f7', spawnInit: 1200, spawnMin: 450, spawnDecay: 8,  enemyBase: 50,  enemyVar: 30, enemyTimeBonus: 6,  enemyTimeCap: 80  },
    normal: { key: '2', label: 'NORMAL', color: '#7cf', spawnInit: 800,  spawnMin: 280, spawnDecay: 12, enemyBase: 70,  enemyVar: 40, enemyTimeBonus: 8,  enemyTimeCap: 120 },
    hard:   { key: '3', label: 'HARD',   color: '#f77', spawnInit: 500,  spawnMin: 180, spawnDecay: 20, enemyBase: 100, enemyVar: 60, enemyTimeBonus: 12, enemyTimeCap: 200 },
  };
  const DIFF_ORDER = ['easy', 'normal', 'hard'];

  const STAR_LAYERS = [
    { count: 60, vMin: 8,  vMax: 22,  sizeNear: 1, sizeFar: 1, colors: ['#445566', '#556677', '#667788'] },
    { count: 40, vMin: 30, vMax: 60,  sizeNear: 1, sizeFar: 2, colors: ['#aabbcc', '#bbccdd', '#ccddee'] },
    { count: 20, vMin: 80, vMax: 120, sizeNear: 2, sizeFar: 3, colors: ['#ffffff', '#eeeeff', '#ffeecc'], twinkle: true },
  ];

  let state = 'title';
  let currentDiff = null;
  let diff = null;
  let player, bullets, enemies, score, lastShotAt, lastSpawnAt, spawnInterval, elapsed;
  let stars = [];
  let particles = [];
  let shootingStars = [];
  let nextShootingStarAt = 3000;

  let nebulaCache = null;
  function getNebula() {
    if (nebulaCache) return nebulaCache;
    const g1 = ctx.createRadialGradient(W * 0.3, H * 0.25, 0, W * 0.3, H * 0.25, 240);
    g1.addColorStop(0, 'rgba(70, 110, 200, 0.22)');
    g1.addColorStop(1, 'rgba(70, 110, 200, 0)');
    const g2 = ctx.createRadialGradient(W * 0.78, H * 0.65, 0, W * 0.78, H * 0.65, 220);
    g2.addColorStop(0, 'rgba(150, 70, 200, 0.18)');
    g2.addColorStop(1, 'rgba(150, 70, 200, 0)');
    const g3 = ctx.createRadialGradient(W * 0.5, H * 0.95, 0, W * 0.5, H * 0.95, 280);
    g3.addColorStop(0, 'rgba(40, 80, 140, 0.16)');
    g3.addColorStop(1, 'rgba(40, 80, 140, 0)');
    nebulaCache = [g1, g2, g3];
    return nebulaCache;
  }

  const keys = Object.create(null);
  window.addEventListener('keydown', (e) => {
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
    const k = e.key.toLowerCase();
    keys[k] = true;
    if (state === 'title') {
      if (k === '1') startGame('easy');
      else if (k === '2') startGame('normal');
      else if (k === '3') startGame('hard');
    } else if (state === 'gameover') {
      if (k === 'r') startGame(currentDiff);
      else if (k === 't') state = 'title';
    }
  });
  window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
  });

  function initStarfield() {
    stars = [];
    STAR_LAYERS.forEach((layer, li) => {
      for (let i = 0; i < layer.count; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          v: layer.vMin + Math.random() * (layer.vMax - layer.vMin),
          r: Math.random() < 0.2 ? layer.sizeFar : layer.sizeNear,
          color: layer.colors[Math.floor(Math.random() * layer.colors.length)],
          layer: li,
          phase: Math.random() * Math.PI * 2,
        });
      }
    });
  }

  function startGame(diffKey) {
    currentDiff = diffKey;
    diff = DIFFICULTIES[diffKey];
    player = { x: W / 2, y: H - 60, w: 28, h: 22, speed: 320 };
    bullets = [];
    enemies = [];
    particles = [];
    score = 0;
    lastShotAt = 0;
    lastSpawnAt = 0;
    spawnInterval = diff.spawnInit;
    elapsed = 0;
    state = 'playing';
  }

  function spawnEnemy() {
    const w = 26, h = 22;
    enemies.push({
      x: Math.random() * (W - w),
      y: -h,
      w, h,
      speed: diff.enemyBase + Math.random() * diff.enemyVar + Math.min(diff.enemyTimeCap, elapsed * diff.enemyTimeBonus),
    });
  }

  function spawnExplosion(x, y, big) {
    const n = big ? 24 : 12;
    const colors = ['#ff0', '#f80', '#fff', '#fc6', '#f55'];
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 70 + Math.random() * (big ? 240 : 160);
      const life = 0.4 + Math.random() * (big ? 0.5 : 0.3);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life,
        maxLife: life,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 1.5 + Math.random() * 1.8,
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles) {
      const t = p.life / p.maxLife;
      ctx.globalAlpha = Math.max(0, t);
      ctx.fillStyle = p.color;
      const s = p.size * (0.5 + 0.5 * t);
      ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
    }
    ctx.restore();
  }

  function maybeSpawnShootingStar(now) {
    if (now < nextShootingStarAt) return;
    nextShootingStarAt = now + 3000 + Math.random() * 5000;
    const fromLeft = Math.random() < 0.5;
    const startX = fromLeft ? -20 : W + 20;
    const startY = Math.random() * H * 0.55;
    const dirX = fromLeft ? 1 : -1;
    shootingStars.push({
      x: startX,
      y: startY,
      vx: dirX * (320 + Math.random() * 220),
      vy: 110 + Math.random() * 90,
      life: 1.0,
      maxLife: 1.0,
    });
  }

  function updateShootingStars(dt) {
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.life -= dt * 0.8;
      if (s.life <= 0 || s.x < -60 || s.x > W + 60 || s.y > H + 60) {
        shootingStars.splice(i, 1);
      }
    }
  }

  function drawShootingStars() {
    ctx.save();
    for (const s of shootingStars) {
      const t = Math.max(0, s.life / s.maxLife);
      const tailLen = 48;
      const speed = Math.hypot(s.vx, s.vy);
      const ux = -s.vx / speed, uy = -s.vy / speed;
      const tailX = s.x + ux * tailLen;
      const tailY = s.y + uy * tailLen;
      const grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
      grad.addColorStop(0, `rgba(255,255,255,${t})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();
      ctx.fillStyle = `rgba(255,255,255,${t})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function update(dt, now) {
    for (const s of stars) {
      s.y += s.v * dt;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }

    maybeSpawnShootingStar(now);
    updateShootingStars(dt);
    updateParticles(dt);

    if (state !== 'playing') return;

    elapsed += dt;

    let dx = 0;
    if (keys['arrowleft'] || keys['a']) dx -= 1;
    if (keys['arrowright'] || keys['d']) dx += 1;
    player.x += dx * player.speed * dt;
    if (player.x < player.w / 2) player.x = player.w / 2;
    if (player.x > W - player.w / 2) player.x = W - player.w / 2;

    if (keys[' '] && now - lastShotAt > 200) {
      bullets.push({ x: player.x - 1.5, y: player.y - 12, w: 3, h: 10, speed: 540 });
      lastShotAt = now;
    }

    for (const b of bullets) b.y -= b.speed * dt;
    for (let i = bullets.length - 1; i >= 0; i--) {
      if (bullets[i].y + bullets[i].h < 0) bullets.splice(i, 1);
    }

    spawnInterval = Math.max(diff.spawnMin, diff.spawnInit - elapsed * diff.spawnDecay);
    if (now - lastSpawnAt > spawnInterval) {
      spawnEnemy();
      lastSpawnAt = now;
    }

    for (const e of enemies) e.y += e.speed * dt;

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      let hit = false;
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
          bullets.splice(j, 1);
          hit = true;
          break;
        }
      }
      if (hit) {
        spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, false);
        enemies.splice(i, 1);
        score += 10;
        continue;
      }
      if (e.y + e.h >= H) {
        spawnExplosion(e.x + e.w / 2, H - 4, false);
        spawnExplosion(player.x, player.y, true);
        state = 'gameover';
      }
    }

    const px = player.x - player.w / 2;
    const py = player.y - player.h / 2;
    for (const e of enemies) {
      if (px < e.x + e.w && px + player.w > e.x && py < e.y + e.h && py + player.h > e.y) {
        spawnExplosion(player.x, player.y, true);
        spawnExplosion(e.x + e.w / 2, e.y + e.h / 2, false);
        state = 'gameover';
        break;
      }
    }
  }

  function drawNebula() {
    const grads = getNebula();
    for (const g of grads) {
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawStars(now) {
    for (const s of stars) {
      let alpha = 1;
      if (s.layer === 2) {
        alpha = 0.55 + 0.45 * Math.sin(now / 280 + s.phase);
      }
      ctx.globalAlpha = alpha;
      ctx.fillStyle = s.color;
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
    ctx.globalAlpha = 1;
  }

  function drawBullet(b) {
    ctx.save();
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#9ff';
    ctx.fillRect(b.x - 1, b.y, b.w + 2, b.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.restore();
  }

  function drawShip(cx, cy, scale, now, withFlame) {
    const w = 28 * scale;
    const h = 22 * scale;

    if (withFlame && now !== undefined) {
      const flicker = 1 + Math.sin(now / 50) * 0.3;
      const flameH = (8 + Math.sin(now / 90) * 3) * scale * flicker;
      ctx.save();
      ctx.shadowColor = '#fa3';
      ctx.shadowBlur = 14 * scale;
      ctx.fillStyle = '#fa3';
      ctx.beginPath();
      ctx.moveTo(cx - 5 * scale, cy + h / 2 - 2);
      ctx.lineTo(cx, cy + h / 2 + flameH);
      ctx.lineTo(cx + 5 * scale, cy + h / 2 - 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffd';
      ctx.beginPath();
      ctx.moveTo(cx - 2.5 * scale, cy + h / 2 - 2);
      ctx.lineTo(cx, cy + h / 2 + flameH * 0.6);
      ctx.lineTo(cx + 2.5 * scale, cy + h / 2 - 2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // wings
    ctx.fillStyle = '#48a';
    ctx.beginPath();
    ctx.moveTo(cx - w / 2, cy + h / 2);
    ctx.lineTo(cx - w / 2 + 4 * scale, cy);
    ctx.lineTo(cx - 6 * scale, cy + 2 * scale);
    ctx.lineTo(cx - 4 * scale, cy + h / 2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + w / 2, cy + h / 2);
    ctx.lineTo(cx + w / 2 - 4 * scale, cy);
    ctx.lineTo(cx + 6 * scale, cy + 2 * scale);
    ctx.lineTo(cx + 4 * scale, cy + h / 2);
    ctx.closePath();
    ctx.fill();

    // body
    ctx.fillStyle = '#9df';
    ctx.beginPath();
    ctx.moveTo(cx, cy - h / 2);
    ctx.lineTo(cx + 6 * scale, cy + h / 2);
    ctx.lineTo(cx - 6 * scale, cy + h / 2);
    ctx.closePath();
    ctx.fill();

    // body highlight
    ctx.fillStyle = '#cef';
    ctx.beginPath();
    ctx.moveTo(cx, cy - h / 2 + 1);
    ctx.lineTo(cx + 1.5 * scale, cy + h / 2 - 4 * scale);
    ctx.lineTo(cx - 1.5 * scale, cy + h / 2 - 4 * scale);
    ctx.closePath();
    ctx.fill();

    // cockpit
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx, cy - 1 * scale, 3 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#7cf';
    ctx.beginPath();
    ctx.arc(cx, cy - 1 * scale, 1.6 * scale, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawPlayer(now) {
    drawShip(player.x, player.y, 1, now, true);
  }

  function drawEnemy(e, now) {
    const cx = e.x + e.w / 2;
    const cy = e.y + e.h / 2;

    // disc body
    ctx.fillStyle = '#a44';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 3, e.w / 2, e.h / 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // disc rim highlight
    ctx.fillStyle = '#d77';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 1, e.w / 2 - 2, 1.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // dome
    ctx.fillStyle = '#f9d';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 1, e.w / 3, e.h / 2, 0, Math.PI, 0);
    ctx.fill();
    // dome highlight
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(cx - 2.5, cy - 2, 1.8, 2.6, 0, Math.PI, 0);
    ctx.fill();

    // blinking lights
    const lightColors = ['#ff0', '#0ff', '#f0f'];
    const phase = Math.floor(now / 220) % 3;
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = lightColors[(i + phase) % 3];
      ctx.fillRect(e.x + 4 + i * 7, e.y + e.h - 3, 2, 2);
    }
  }

  function drawTitle(now) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.shadowColor = '#7cf';
    ctx.shadowBlur = 22;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 38px monospace';
    ctx.fillText('SPACE SHOOTER', W / 2, 140);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.fillText('Select Difficulty', W / 2, 200);
    ctx.restore();

    // ship icon hovering
    const hover = Math.sin(now / 500) * 4;
    drawShip(W / 2, 250 + hover, 1.1, now, true);

    const startY = 320;
    const gap = 54;
    DIFF_ORDER.forEach((key, i) => {
      const d = DIFFICULTIES[key];
      ctx.save();
      ctx.shadowColor = d.color;
      ctx.shadowBlur = 14;
      ctx.fillStyle = d.color;
      ctx.font = 'bold 26px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`[${d.key}]  ${d.label}`, W / 2, startY + i * gap);
      ctx.restore();
    });

    ctx.fillStyle = '#666';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Move: ← → / A D     Shoot: Space', W / 2, H - 40);
  }

  function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Score: ' + score, 12, 24);
    if (diff) {
      ctx.textAlign = 'right';
      ctx.fillStyle = diff.color;
      ctx.fillText(diff.label, W - 12, 24);
    }
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, H / 2 - 80, W, 170);
    ctx.save();
    ctx.shadowColor = '#f55';
    ctx.shadowBlur = 16;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 32px monospace';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = '16px monospace';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 8);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.fillText('R: Restart   T: Title', W / 2, H / 2 + 50);
  }

  function draw(now) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawNebula();
    drawStars(now);
    drawShootingStars();

    if (state === 'title') {
      drawTitle(now);
      drawParticles();
      return;
    }

    for (const b of bullets) drawBullet(b);
    for (const e of enemies) drawEnemy(e, now);

    if (state === 'playing') drawPlayer(now);

    drawParticles();
    drawHUD();

    if (state === 'gameover') drawGameOver();
  }

  let lastTime = performance.now();
  function loop(now) {
    let dt = (now - lastTime) / 1000;
    if (dt > 0.05) dt = 0.05;
    lastTime = now;
    update(dt, now);
    draw(now);
    requestAnimationFrame(loop);
  }

  initStarfield();
  requestAnimationFrame((t) => { lastTime = t; loop(t); });
})();
</script>
</body>
</html>
