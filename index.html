<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shooting Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }
  canvas {
    background: #000;
    border: 1px solid #333;
    box-shadow: 0 0 24px rgba(80, 160, 255, 0.2);
    image-rendering: pixelated;
  }
  .hint {
    margin-top: 12px;
    font-size: 13px;
    color: #888;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <canvas id="game" width="480" height="640"></canvas>
  <div class="hint">←→ / A D 移動 &nbsp;・&nbsp; Space 発射 &nbsp;・&nbsp; R リスタート &nbsp;・&nbsp; T タイトル</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const DIFFICULTIES = {
    easy:   { key: '1', label: 'EASY',   color: '#7f7', spawnInit: 1800, spawnMin: 900, spawnDecay: 3,  enemyBase: 35,  enemyVar: 15, enemyTimeBonus: 2,  enemyTimeCap: 40  },
    normal: { key: '2', label: 'NORMAL', color: '#7cf', spawnInit: 800,  spawnMin: 280, spawnDecay: 12, enemyBase: 70,  enemyVar: 40, enemyTimeBonus: 8,  enemyTimeCap: 120 },
    hard:   { key: '3', label: 'HARD',   color: '#f77', spawnInit: 500,  spawnMin: 180, spawnDecay: 20, enemyBase: 100, enemyVar: 60, enemyTimeBonus: 12, enemyTimeCap: 200 },
  };
  const DIFF_ORDER = ['easy', 'normal', 'hard'];

  const ITEM_TYPES = [
    { key: 'wide',   color: '#fc6', label: 'W', name: 'WIDE',   desc: '弾が太くなる'       },
    { key: 'spread', color: '#f6f', label: 'S', name: 'SPREAD', desc: '3方向に発射'        },
    { key: 'rapid',  color: '#6cf', label: 'R', name: 'RAPID',  desc: '連射速度アップ'     },
    { key: 'pierce', color: '#ff6', label: 'P', name: 'PIERCE', desc: '弾が敵を貫通'       },
    { key: 'shield', color: '#6f6', label: 'H', name: 'SHIELD', desc: '被弾を1回防ぐ'      },
  ];
  const POWER_DURATION = 10;
  const GOLD_CHANCE = 0.1;

  let state = 'title';
  let currentDiff = null;
  let diff = null;
  let player, bullets, enemies, items, powers, stars, score, lastShotAt, lastSpawnAt, spawnInterval, elapsed;

  const keys = Object.create(null);
  window.addEventListener('keydown', (e) => {
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
    const k = e.key.toLowerCase();
    keys[k] = true;
    if (state === 'title') {
      if (k === '1') startGame('easy');
      else if (k === '2') startGame('normal');
      else if (k === '3') startGame('hard');
    } else if (state === 'gameover') {
      if (k === 'r') startGame(currentDiff);
      else if (k === 't') state = 'title';
    }
  });
  window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
  });

  function initStarfield() {
    stars = Array.from({ length: 80 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      v: 20 + Math.random() * 60,
      r: Math.random() < 0.2 ? 1.5 : 1,
    }));
  }

  function startGame(diffKey) {
    currentDiff = diffKey;
    diff = DIFFICULTIES[diffKey];
    player = { x: W / 2, y: H - 60, w: 28, h: 22, speed: 320 };
    bullets = [];
    enemies = [];
    items = [];
    powers = { wide: 0, spread: 0, rapid: 0, pierce: 0, shield: false };
    initStarfield();
    score = 0;
    lastShotAt = 0;
    lastSpawnAt = 0;
    spawnInterval = diff.spawnInit;
    elapsed = 0;
    state = 'playing';
  }

  function spawnEnemy() {
    const w = 26, h = 22;
    enemies.push({
      x: Math.random() * (W - w),
      y: -h,
      w, h,
      speed: diff.enemyBase + Math.random() * diff.enemyVar + Math.min(diff.enemyTimeCap, elapsed * diff.enemyTimeBonus),
      gold: Math.random() < GOLD_CHANCE,
    });
  }

  function update(dt, now) {
    for (const s of stars) {
      s.y += s.v * dt;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }

    if (state !== 'playing') return;

    elapsed += dt;

    for (const k of ['wide', 'spread', 'rapid', 'pierce']) {
      if (powers[k] > 0) powers[k] = Math.max(0, powers[k] - dt);
    }

    let dx = 0;
    if (keys['arrowleft'] || keys['a']) dx -= 1;
    if (keys['arrowright'] || keys['d']) dx += 1;
    player.x += dx * player.speed * dt;
    if (player.x < player.w / 2) player.x = player.w / 2;
    if (player.x > W - player.w / 2) player.x = W - player.w / 2;

    const shootInterval = powers.rapid > 0 ? 90 : 200;
    if (keys[' '] && now - lastShotAt > shootInterval) {
      const bw = powers.wide > 0 ? 9 : 3;
      const bSpeed = 540;
      const pierce = powers.pierce > 0;
      const make = (vx, vy) => bullets.push({
        x: player.x - bw / 2, y: player.y - 12, w: bw, h: 10, vx, vy, pierce,
      });
      if (powers.spread > 0) {
        const a = 0.26;
        make(-Math.sin(a) * bSpeed, -Math.cos(a) * bSpeed);
        make(0, -bSpeed);
        make(Math.sin(a) * bSpeed, -Math.cos(a) * bSpeed);
      } else {
        make(0, -bSpeed);
      }
      lastShotAt = now;
    }

    for (const b of bullets) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    }
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (b.y + b.h < 0 || b.x + b.w < 0 || b.x > W) bullets.splice(i, 1);
    }

    spawnInterval = Math.max(diff.spawnMin, diff.spawnInit - elapsed * diff.spawnDecay);
    if (now - lastSpawnAt > spawnInterval) {
      spawnEnemy();
      lastSpawnAt = now;
    }

    for (const e of enemies) e.y += e.speed * dt;

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      let hit = false;
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
          if (!b.pierce) bullets.splice(j, 1);
          hit = true;
          break;
        }
      }
      if (hit) {
        if (e.gold) {
          const t = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
          items.push({ x: e.x + e.w / 2 - 8, y: e.y, w: 16, h: 16, vy: 120, type: t });
        }
        enemies.splice(i, 1);
        score += e.gold ? 30 : 10;
        continue;
      }
      if (e.y + e.h >= H) {
        if (powers.shield) {
          powers.shield = false;
          enemies.splice(i, 1);
        } else {
          state = 'gameover';
        }
      }
    }

    const px = player.x - player.w / 2;
    const py = player.y - player.h / 2;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (px < e.x + e.w && px + player.w > e.x && py < e.y + e.h && py + player.h > e.y) {
        if (powers.shield) {
          powers.shield = false;
          enemies.splice(i, 1);
        } else {
          state = 'gameover';
          break;
        }
      }
    }

    for (const it of items) it.y += it.vy * dt;
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (it.y > H) { items.splice(i, 1); continue; }
      if (px < it.x + it.w && px + player.w > it.x && py < it.y + it.h && py + player.h > it.y) {
        if (it.type.key === 'shield') powers.shield = true;
        else powers[it.type.key] = POWER_DURATION;
        items.splice(i, 1);
      }
    }
  }

  function drawStars() {
    for (const s of stars) {
      ctx.fillStyle = s.r > 1 ? '#fff' : '#aaa';
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
  }

  function drawPlayer() {
    if (powers && powers.shield) {
      ctx.strokeStyle = 'rgba(120,255,200,0.7)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(player.x, player.y, 22, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
    }
    ctx.fillStyle = '#7cf';
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - player.h / 2);
    ctx.lineTo(player.x - player.w / 2, player.y + player.h / 2);
    ctx.lineTo(player.x + player.w / 2, player.y + player.h / 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x - 2, player.y - 2, 4, 4);
  }

  function drawEnemy(e) {
    ctx.fillStyle = e.gold ? '#fc3' : '#f55';
    ctx.fillRect(e.x, e.y, e.w, e.h);
    if (e.gold) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(e.x + 0.5, e.y + 0.5, e.w - 1, e.h - 1);
    }
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x + 5, e.y + 6, 4, 4);
    ctx.fillRect(e.x + e.w - 9, e.y + 6, 4, 4);
    ctx.fillStyle = '#222';
    ctx.fillRect(e.x + 6, e.y + 7, 2, 2);
    ctx.fillRect(e.x + e.w - 8, e.y + 7, 2, 2);
  }

  function drawTitle() {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px monospace';
    ctx.fillText('SHOOTING GAME', W / 2, 170);

    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.fillText('Select Difficulty', W / 2, 240);

    const startY = 300;
    const gap = 54;
    DIFF_ORDER.forEach((key, i) => {
      const d = DIFFICULTIES[key];
      ctx.fillStyle = d.color;
      ctx.font = 'bold 26px monospace';
      ctx.fillText(`[${d.key}]  ${d.label}`, W / 2, startY + i * gap);
    });

    ctx.fillStyle = '#aaa';
    ctx.font = '13px monospace';
    ctx.fillText('ITEMS', W / 2, 470);

    const guideX = 120;
    const sw = 16;
    ITEM_TYPES.forEach((t, i) => {
      const y = 492 + i * 22;
      ctx.fillStyle = t.color;
      ctx.fillRect(guideX, y - sw / 2, sw, sw);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(t.label, guideX + sw / 2, y + 1);
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = '#ddd';
      ctx.font = '13px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`${t.name} … ${t.desc}`, guideX + sw + 10, y + 4);
    });

    ctx.textAlign = 'center';
    ctx.fillStyle = '#666';
    ctx.font = '12px monospace';
    ctx.fillText('Move: ← → / A D     Shoot: Space', W / 2, H - 28);
  }

  function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Score: ' + score, 12, 24);
    if (diff) {
      ctx.textAlign = 'right';
      ctx.fillStyle = diff.color;
      ctx.fillText(diff.label, W - 12, 24);
    }
    if (powers) {
      ctx.textAlign = 'left';
      ctx.font = '12px monospace';
      let py = 44;
      for (const t of ITEM_TYPES) {
        let label = null;
        if (t.key === 'shield') {
          if (powers.shield) label = t.name;
        } else if (powers[t.key] > 0) {
          label = `${t.name} ${powers[t.key].toFixed(1)}s`;
        }
        if (label) {
          ctx.fillStyle = t.color;
          ctx.fillText(label, 12, py);
          py += 16;
        }
      }
    }
  }

  function drawItemLegend() {
    const n = ITEM_TYPES.length;
    const sw = 12;
    const cellW = W / n;
    const y = H - 18;
    ctx.font = '11px monospace';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < n; i++) {
      const t = ITEM_TYPES[i];
      const cx = i * cellW + 8;
      ctx.fillStyle = t.color;
      ctx.fillRect(cx, y - sw / 2, sw, sw);
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.fillText(t.label, cx + sw / 2, y + 1);
      ctx.fillStyle = '#bbb';
      ctx.textAlign = 'left';
      ctx.fillText(t.name, cx + sw + 4, y + 1);
    }
    ctx.textBaseline = 'alphabetic';
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, H / 2 - 80, W, 170);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 32px monospace';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
    ctx.font = '16px monospace';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 8);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.fillText('R: Restart   T: Title', W / 2, H / 2 + 50);
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawStars();

    if (state === 'title') {
      drawTitle();
      return;
    }

    for (const b of bullets) {
      ctx.fillStyle = '#ff0';
      ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    for (const e of enemies) drawEnemy(e);

    for (const it of items) {
      ctx.fillStyle = it.type.color;
      ctx.fillRect(it.x, it.y, it.w, it.h);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(it.type.label, it.x + it.w / 2, it.y + it.h / 2 + 1);
      ctx.textBaseline = 'alphabetic';
    }

    if (state === 'playing') drawPlayer();

    drawHUD();
    drawItemLegend();

    if (state === 'gameover') drawGameOver();
  }

  let lastTime = performance.now();
  function loop(now) {
    let dt = (now - lastTime) / 1000;
    if (dt > 0.05) dt = 0.05;
    lastTime = now;
    update(dt, now);
    draw();
    requestAnimationFrame(loop);
  }

  initStarfield();
  requestAnimationFrame((t) => { lastTime = t; loop(t); });
})();
</script>
</body>
</html>
